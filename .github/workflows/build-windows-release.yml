# Real Windows binaries must be produced on Windows. This workflow builds PyInstaller output
# and uploads SlapYourMac-windows.zip as a workflow artifact (always); on Git tag pushes
# matching v*, it also attaches the zip to a GitHub Release (stable “one link” download).
name: Build Windows zip

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          show-progress: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps and PyInstaller build
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt
          pip install pyinstaller
          python -m PyInstaller slap-your-mac-win.spec

      - name: Create releases/SlapYourMac-windows.zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path releases | Out-Null
          $zip = "releases\SlapYourMac-windows.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "dist\SlapYourMac.exe" -DestinationPath $zip -Force

      - uses: actions/upload-artifact@v7
        with:
          name: SlapYourMac-windows.zip
          path: releases/SlapYourMac-windows.zip

      - name: Attach zip to GitHub Release (tags only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v3
        with:
          files: releases/SlapYourMac-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
